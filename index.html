<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>我们的纪念日</title>
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.min.js"></script>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        :root{
            --text:#ffffff;
            --pink:#ff6b81;
            --shadow:0 0 20px rgba(161,37,174,.45);
        }

        body{
            min-height:100vh;
            overflow-x:hidden;

            display:flex;
            justify-content:center;
            align-items:center;

            font-family:
                    "PingFang SC",
                    "Microsoft YaHei",
                    sans-serif;

            color:var(--text);

            background: linear-gradient(
                    270deg,
                    #FFE0B2,
                    #FFCCBC,
                    #FFCDD2,
                    #F8BBD0,
                    #E1BEE7,
                    #BBDEFB,
                    #B3E5FC
            );

            background-size:1600% 1600%;
            animation:rainbow 25s ease infinite;

            position:relative;
        }

        @keyframes rainbow{
            0%{
                background-position:0% 50%;
            }
            50%{
                background-position:100% 50%;
            }
            100%{
                background-position:0% 50%;
            }
        }

        /* ================= 主容器 ================= */

        .container{
            width:min(92%, 950px);

            padding:28px 22px;

            border-radius:32px;

            background:rgba(255,255,255,.12);

            backdrop-filter:blur(16px);

            -webkit-backdrop-filter:blur(16px);

            border:1px solid rgba(255,255,255,.18);

            box-shadow:
                    0 10px 40px rgba(0,0,0,.15);

            display:flex;
            flex-direction:column;
            align-items:center;

            gap:20px;

            z-index:5;
        }

        /* ================= 音乐按钮 ================= */

        .music{
            position:fixed;
            top:20px;
            left:20px;
            z-index:999;
        }

        .music button{
            width:58px;
            height:58px;

            border:none;
            border-radius:50%;

            cursor:pointer;

            font-size:24px;

            color:white;

            background:rgba(255,255,255,.2);

            backdrop-filter:blur(10px);

            box-shadow:
                    0 4px 20px rgba(255,255,255,.25);

            transition:.3s;
        }

        .music button:hover{
            transform:scale(1.1);
        }

        .music button.playing{
            animation:rotateBtn 3s linear infinite;
        }

        @keyframes rotateBtn{
            from{
                transform:rotate(0deg);
            }
            to{
                transform:rotate(360deg);
            }
        }

        /* ================= 标题区域 ================= */

        #love-line{

            display:flex;

            flex-direction:column;

            align-items:center;

            gap:10px;

            text-shadow:var(--shadow);
        }

        .top-title{

            font-size:clamp(28px,4vw,42px);

            font-weight:700;

            letter-spacing:1px;
        }

        .days-line{

            display:flex;

            align-items:flex-end;

            gap:10px;
        }

        .number{

            font-size:clamp(90px,22vw,160px);

            font-weight:800;

            color:#ff5f8f;

            line-height:1;
        }

        .days-text{

            font-size:clamp(32px,5vw,48px);

            font-weight:700;

            margin-bottom:12px;
        }



        .number{
            font-size:clamp(70px,10vw,150px);

            font-weight:800;

            color:var(--pink);

            line-height:1;

            animation:numberBeat 1.8s infinite;
        }

        @keyframes heartbeat{
            0%{
                transform:scale(1);
            }
            30%{
                transform:scale(1.18);
            }
            60%{
                transform:scale(1);
            }
            100%{
                transform:scale(1.08);
            }
        }

        @keyframes numberBeat{
            0%{
                transform:scale(1);
            }
            50%{
                transform:scale(1.08);
            }
            100%{
                transform:scale(1);
            }
        }

        /* ================= 倒计时 ================= */

        #countdown{
            font-size:clamp(22px,2.6vw,38px);

            font-weight:600;

            text-shadow:var(--shadow);

            text-align:center;
        }

        /* ================= 生日区域 ================= */

        .birthday-box{

            display:flex;

            flex-wrap:wrap;

            justify-content:center;

            gap:12px;

            width:100%;
        }

        .birthday-item{

            font-size:clamp(14px,3.2vw,18px);

            font-weight:600;

            color:#fff;

            padding:10px 16px;

            border-radius:16px;

            background:rgba(255,255,255,.10);

            border:1px solid rgba(255,255,255,.12);

            backdrop-filter:blur(8px);

            white-space:nowrap;
        }

        /* ================= 文案 ================= */
/*
        #message{
            width:100%;
            max-width:720px;

            text-align:center;

            line-height:1.9;

            color:#fff5f7;

            text-shadow:0 0 10px rgba(0,0,0,.15);

            font-size:clamp(16px,2vw,26px);
        }
        #message{
            font-size:clamp(15px,3.8vw,22px);
        }

 */

        /* ================= 泡泡 ================= */

        .bubble{
            position:fixed;

            bottom:-120px;

            border-radius:50%;

            opacity:.45;

            pointer-events:none;

            z-index:1;

            animation:
                    floatUp linear forwards,
                    colorChange 6s infinite;
        }

        @keyframes floatUp{
            0%{
                transform:
                        translateY(0)
                        scale(.3);

                opacity:0;
            }

            20%{
                opacity:.5;
            }

            100%{
                transform:
                        translateY(-120vh)
                        scale(1);

                opacity:0;
            }
        }

        @keyframes colorChange{
            0%{
                background:#dff6ff;
            }

            50%{
                background:#a8e6ff;
            }

            100%{
                background:#7ed6ff;
            }
        }

        /* ================= 樱花 ================= */

        .sakura{
            position:fixed;

            top:-10vh;

            width:12px;
            height:12px;

            border-radius:50% 70% 50% 70%;

            background:#ffb7c5;

            opacity:.8;

            pointer-events:none;

            z-index:2;

            animation:
                    sakuraFall linear forwards,
                    sakuraFade ease-in forwards;
        }

        @keyframes sakuraFall{
            from{
                transform:
                        translateY(0)
                        translateX(0)
                        rotate(0deg);
            }

            to{
                transform:
                        translateY(120vh)
                        translateX(18vw)
                        rotate(360deg);
            }
        }

        @keyframes sakuraFade{
            0%{
                opacity:.9;
            }

            70%{
                opacity:.5;
            }

            100%{
                opacity:0;
            }
        }

        /* ================= 点击爱心 ================= */

        .click-heart{
            position:fixed;

            pointer-events:none;

            z-index:99999;

            font-size:28px;

            animation:clickHeart 1s ease-out forwards;
        }

        @keyframes clickHeart{
            0%{
                transform:
                        scale(1)
                        translateY(0);

                opacity:1;
            }

            100%{
                transform:
                        scale(.5)
                        translateY(-80px);

                opacity:0;
            }
        }

        /* ================= 手机适配 ================= */

        @media (max-width:768px){

            .container{
                width:94%;
                padding:28px 20px;
                gap:22px;
                border-radius:24px;
            }

            #love-line{
                gap:12px;
            }

            .number{
                width:100%;
                text-align:center;
            }

            #message{
                line-height:1.7;
            }

            .music button{
                width:52px;
                height:52px;
                font-size:22px;
            }
        }

    </style>
</head>

<body>

<!-- ================= 音乐 ================= -->

<div class="music">

    <audio id="bgm" autoplay loop playsinline>
        <source src="yuai.mp3" type="audio/mp3">
    </audio>

    <button onclick="toggleMusic()">🎧</button>

</div>

<!-- ================= 主内容 ================= -->

<div class="container">


    <div id="love-line">

        <div class="top-title">
            ❤️ 我们相恋了 ❤️
        </div>

        <div class="days-line">
            <span id="days" class="number">0</span>
            <span class="days-text">天</span>
        </div>

    </div>

    <div id="countdown">
        距离下一次纪念日还有 0 天
    </div>

    <div class="birthday-box">

        <div id="boyfriend-birthday" class="birthday-item">
            🎂 zhh生日还有 0 天
        </div>

        <div id="my-birthday" class="birthday-item">
            🎐 zhj生日还有 0 天
        </div>

    </div>

    <div id="message">
        愿我们走过的每一天，
        都比昨天更相爱。
        <br>
        希望未来的每一个春夏秋冬，
        身边的人始终都是你。
    </div>

</div>

<script>

    /* ================= 恋爱开始日期 ================= */

    const startDate = new Date("2025-11-01");

    /* ================= 相恋天数 ================= */

    function updateDays(){

        const now = new Date();

        const diff = now - startDate;

        const days = Math.floor(
            diff / (1000 * 60 * 60 * 24)
        );

        document.getElementById("days").innerText = days;
    }

    updateDays();

    setInterval(updateDays, 1000);

    /* ================= 纪念日倒计时 ================= */

    function updateCountdown(){

        const now = new Date();

        const year = now.getFullYear();

        let nextDate = new Date(`${year}-11-01`);

        if(now > nextDate){

            nextDate = new Date(`${year + 1}-11-01`);
        }

        const diff = nextDate - now;

        const days = Math.ceil(
            diff / (1000 * 60 * 60 * 24)
        );

        document.getElementById("countdown").innerText =
            `距离下一次纪念日还有 ${days} 天`;
    }

    updateCountdown();

    setInterval(updateCountdown, 1000 * 60 * 30);

    /* ================= 音乐 ================= */

    const audio = document.getElementById("bgm");

    const musicBtn =
        document.querySelector(".music button");

    function toggleMusic(){

        if(audio.paused){

            audio.play();

            musicBtn.classList.add("playing");

        }else{

            audio.pause();

            musicBtn.classList.remove("playing");
        }
    }
    /* ================= 男朋友生日倒计时 ================= */

    function updateBirthday(){

        const now = new Date();

        const year = now.getFullYear();

        // 今年生日
        let birthday =
            new Date(`${year}-08-12`);

        // 今年过了就算明年
        if(now > birthday){

            birthday =
                new Date(`${year + 1}-08-12`);
        }

        const diff =
            birthday - now;

        const days = Math.ceil(
            diff / (1000 * 60 * 60 * 24)
        );

        document.getElementById(
            "boyfriend-birthday"
        ).innerText =
            `🎂 ZHH生日还有 ${days} 天`;
    }

    updateBirthday();

    setInterval(
        updateBirthday,
        1000 * 60 * 30
    );

    /* ================= 我的农历生日 ================= */

    function updateMyBirthday(){

        const now = new Date();

        const currentYear =
            now.getFullYear();

        // 农历五月初五
        let solar =
            Lunar.fromYmd(
                currentYear,
                5,
                5
            ).getSolar();

        let birthday =
            new Date(
                solar.getYear(),
                solar.getMonth() - 1,
                solar.getDay()
            );

        // 如果今年已经过了
        if(now > birthday){

            solar =
                Lunar.fromYmd(
                    currentYear + 1,
                    5,
                    5
                ).getSolar();

            birthday =
                new Date(
                    solar.getYear(),
                    solar.getMonth() - 1,
                    solar.getDay()
                );
        }

        const diff =
            birthday - now;

        const days = Math.ceil(
            diff / (1000 * 60 * 60 * 24)
        );

        document.getElementById(
            "my-birthday"
        ).innerText =
            `🎐 ZHJ生日还有 ${days} 天`;
    }

    updateMyBirthday();

    setInterval(
        updateMyBirthday,
        1000 * 60 * 30
    );

    /* 自动播放检测 */

    window.addEventListener("load", () => {

        setTimeout(() => {

            if(!audio.paused){

                musicBtn.classList.add("playing");
            }

        }, 400);

    });

    /* 手机端触摸触发 */

    document.addEventListener("touchstart", () => {

        if(audio.paused){

            audio.play();
        }

        musicBtn.classList.add("playing");

    }, { once:true });

    /* ================= 泡泡 ================= */

    function createBubble(){

        const bubble =
            document.createElement("div");

        bubble.className = "bubble";

        const size =
            Math.random() * 50 + 20;

        bubble.style.width =
            size + "px";

        bubble.style.height =
            size + "px";

        bubble.style.left =
            Math.random() * window.innerWidth + "px";

        bubble.style.animationDuration =
            (Math.random() * 5 + 7) + "s";

        document.body.appendChild(bubble);

        setTimeout(() => {

            bubble.remove();

        }, 12000);
    }

    /* ================= 樱花 ================= */

    function createSakura(){

        const sakura =
            document.createElement("div");

        sakura.className = "sakura";

        sakura.style.left =
            Math.random() * window.innerWidth + "px";

        sakura.style.animationDuration =
            (Math.random() * 4 + 6) + "s";

        sakura.style.transform =
            `rotate(${Math.random()*360}deg)`;

        document.body.appendChild(sakura);

        setTimeout(() => {

            sakura.remove();

        }, 12000);
    }

    /* 手机降低动画频率 */

    const isMobile =
        window.innerWidth < 768;

    setInterval(
        createBubble,
        isMobile ? 900 : 550
    );

    setInterval(
        createSakura,
        isMobile ? 1200 : 700
    );

    /* ================= 点击爱心 ================= */

    document.addEventListener("click", e => {

        const heart =
            document.createElement("div");

        heart.className = "click-heart";

        heart.innerText = "❤️";

        heart.style.left =
            (e.clientX - 10) + "px";

        heart.style.top =
            (e.clientY - 10) + "px";

        document.body.appendChild(heart);

        setTimeout(() => {

            heart.remove();

        }, 1000);

    });

</script>

</body>
</html>
